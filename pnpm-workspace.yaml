allowBuilds:
  esbuild: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - vite@8.1.0
  - tar@7.5.3 || 7.5.4 || 7.5.7 || 7.5.8 || 7.5.10 || 7.5.11 || 7.5.16
  - minimatch@3.1.3 || 3.1.4 || 9.0.6 || 9.0.7
  - basic-ftp@5.2.0 || 5.2.2 || 5.2.3 || 5.3.1
  - ajv@6.14.0
  - flatted@3.4.0 || 3.4.2
  - handlebars@4.7.9
  - brace-expansion@1.1.13 || 2.0.3
  - picomatch@2.3.2 || 4.0.4
  - yaml@2.8.3
  - defu@6.1.5
  - ip-address@10.1.1
  - js-yaml@4.1.2
  - undici@7.28.0
# Transitive security fixes (all dev-only deps). Forced to patched
# versions via overrides because they're pulled in by release-it,
# vitest, eslint and tsdown several levels deep.
overrides:
  ajv: ^6.14.0
  basic-ftp: ^5.3.1
  brace-expansion@1: ^1.1.13
  brace-expansion@2: ^2.0.3
  defu: ^6.1.5
  flatted: ^3.4.2
  handlebars: ^4.7.9
  ip-address: ^10.1.1
  js-yaml: ^4.2.0
  minimatch@3: ^3.1.4
  minimatch@9: ^9.0.7
  picomatch@2: ^2.3.2
  picomatch@4: ^4.0.4
  tar: ^7.5.16
  undici: ^7.28.0
  yaml: ^2.8.3

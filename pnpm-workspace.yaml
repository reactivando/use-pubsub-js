allowBuilds:
  esbuild: true
  unrs-resolver: true
# vite 8.1.0 is still inside pnpm 11's default minimumReleaseAge window;
# exclude it so installs resolve until it ages out.
minimumReleaseAgeExclude:
  - vite@8.1.0
# Transitive security fixes (all dev-only deps). Forced to patched
# versions via overrides because they're pulled in by release-it,
# vitest, eslint and tsdown several levels deep.
overrides:
  ajv: ^6.14.0
  basic-ftp: ^5.3.1
  brace-expansion@1: ^1.1.13
  brace-expansion@2: ^2.0.3
  defu: ^6.1.5
  flatted: ^3.4.2
  handlebars: ^4.7.9
  ip-address: ^10.1.1
  js-yaml: ^4.2.0
  minimatch@3: ^3.1.4
  minimatch@9: ^9.0.7
  picomatch@2: ^2.3.2
  picomatch@4: ^4.0.4
  tar: ^7.5.16
  undici: ^7.28.0
  yaml: ^2.8.3

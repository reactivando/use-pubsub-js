name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Install dependencies
      run: |
        pnpm install --frozen-lockfile
        pnpm --prefix ./example install --frozen-lockfile

    - name: Check tests
      run: pnpm test --coverage

    - name: Check linting
      run: pnpm lint

    - name: Build library and example
      run: |
        pnpm build
        pnpm --prefix ./example build

    - name: End-to-end import smoke tests (CJS/ESM)
      run: pnpm test:e2e

    - name: Validate package (types resolution + publint)
      run: pnpm check:package

    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

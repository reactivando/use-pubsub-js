name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Verify the supported React peer range, not just the dev version.
        react: ['18', '19']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 1

    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Pin React ${{ matrix.react }}
      if: matrix.react == '18'
      run: pnpm add -D -E react@18 react-dom@18 @types/react@18 @types/react-dom@18

    # Coverage is gated on the React 19 cell only: the react19/ suite (useEffectEvent)
    # is skipped on React 18, so coverage there would be incomplete by design.
    # The `&& '--coverage' || ''` idiom is safe here because '--coverage' is a
    # non-empty (truthy) string; it would misbehave only with a falsy value.
    - name: Check tests
      run: pnpm test ${{ matrix.react == '19' && '--coverage' || '' }}

    # The steps below are React-version-independent, so run them once (on 19).
    - name: Check linting
      if: matrix.react == '19'
      run: pnpm lint

    - name: Build library and example
      if: matrix.react == '19'
      run: |
        pnpm --prefix ./example install --frozen-lockfile
        pnpm build
        pnpm --prefix ./example build

    - name: End-to-end import smoke tests (CJS/ESM)
      if: matrix.react == '19'
      run: cd e2e && pnpm install --ignore-workspace && pnpm test

    - name: Validate package (types resolution + publint)
      if: matrix.react == '19'
      run: pnpm exec attw --pack . && pnpm exec publint

    - name: Bundle size guard
      if: matrix.react == '19'
      run: pnpm size

    - name: Audit dependencies
      if: matrix.react == '19'
      run: pnpm audit --audit-level=high

    - name: Coveralls
      if: matrix.react == '19'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
